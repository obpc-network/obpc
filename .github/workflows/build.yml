name: OBPC Linux Build

on:
  push:
    branches: [ "master", "develop" ]
    tags: [ 'v*' ]

jobs:
  build-ubuntu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config libboost-all-dev libssl-dev libzmq3-dev libunbound-dev libreadline-dev liblibsodium-dev libhidapi-dev libusb-1.0-0-dev libudev-dev libunwind-dev

      - name: Build
        run: |
          mkdir build && cd build
          cmake ..
          make -j$(nproc)

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: obpc-linux-binaries
          path: build/bin/